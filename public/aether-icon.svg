<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="brain-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A6B85"/>
      <stop offset="50%" stop-color="#6D597A"/>
      <stop offset="100%" stop-color="#5C4A6A"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#6D597A"/>
  <!-- Abstract brain / neural network icon -->
  <g filter="url(#glow)">
    <!-- Left hemisphere - flowing curve -->
    <path d="M256 96 C256 96 180 96 148 148 C116 200 116 240 140 276 C164 312 180 328 180 356 C180 384 164 404 164 404" 
          stroke="white" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9"/>
    <!-- Right hemisphere - flowing curve -->
    <path d="M256 96 C256 96 332 96 364 148 C396 200 396 240 372 276 C348 312 332 328 332 356 C332 384 348 404 348 404" 
          stroke="white" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9"/>
    <!-- Central vertical spine -->
    <path d="M256 88 L256 424" 
          stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <!-- Left inner curve -->
    <path d="M256 160 C220 160 196 180 196 220 C196 260 220 280 256 280" 
          stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Right inner curve -->
    <path d="M256 160 C292 160 316 180 316 220 C316 260 292 280 256 280" 
          stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Lower inner curves -->
    <path d="M256 300 C224 300 200 320 200 350 C200 380 224 396 256 396" 
          stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M256 300 C288 300 312 320 312 350 C312 380 288 396 256 396" 
          stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.5"/>
    <!-- Neural nodes -->
    <circle cx="256" cy="88" r="10" fill="white" opacity="0.95"/>
    <circle cx="256" cy="424" r="10" fill="white" opacity="0.95"/>
    <circle cx="148" cy="148" r="9" fill="white" opacity="0.8"/>
    <circle cx="364" cy="148" r="9" fill="white" opacity="0.8"/>
    <circle cx="140" cy="276" r="8" fill="white" opacity="0.7"/>
    <circle cx="372" cy="276" r="8" fill="white" opacity="0.7"/>
    <circle cx="196" cy="220" r="7" fill="white" opacity="0.7"/>
    <circle cx="316" cy="220" r="7" fill="white" opacity="0.7"/>
    <circle cx="256" cy="160" r="8" fill="white" opacity="0.8"/>
    <circle cx="256" cy="280" r="8" fill="white" opacity="0.8"/>
    <circle cx="200" cy="350" r="6" fill="white" opacity="0.6"/>
    <circle cx="312" cy="350" r="6" fill="white" opacity="0.6"/>
    <circle cx="256" cy="396" r="7" fill="white" opacity="0.7"/>
    <circle cx="180" cy="356" r="7" fill="white" opacity="0.65"/>
    <circle cx="332" cy="356" r="7" fill="white" opacity="0.65"/>
    <!-- Subtle connection lines between nodes -->
    <line x1="148" y1="148" x2="196" y2="220" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <line x1="364" y1="148" x2="316" y2="220" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <line x1="140" y1="276" x2="196" y2="220" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <line x1="372" y1="276" x2="316" y2="220" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <line x1="140" y1="276" x2="200" y2="350" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <line x1="372" y1="276" x2="312" y2="350" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <line x1="180" y1="356" x2="200" y2="350" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <line x1="332" y1="356" x2="312" y2="350" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  </g>
</svg>